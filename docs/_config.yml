title: LC-MS Pipeline
description: >-
  A validation-first LC-MS/MS pipeline, developed against MTBLS1861's
  reference-standard runs and built to generalize to real untargeted
  metabolomics cohorts.

remote_theme: just-the-docs/just-the-docs
color_scheme: light

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

search_enabled: true
heading_anchors: true

# Without this, kramdown treats content inside any block-level HTML tag
# (<div>, etc.) as raw HTML and stops parsing markdown syntax within it --
# headers, bold, links, all of it get dumped through as literal text.
# This was the cause of "## Validation summary" rendering as plain text
# on the QC Report page. Setting this globally means you don't have to
# remember to add markdown="1" to every individual HTML block by hand.
kramdown:
  parse_block_html: true

# TODO: fill these in once the repo is public
# aux_links:
#   "View on GitHub":
#     - "https://github.com/<your-username>/<your-repo>"

nav_external_links:
  - title: MTBLS1861 (source study)
    url: https://www.ebi.ac.uk/metabolights/MTBLS1861

footer_content: >-
  Pipeline docs generated from the project's own architecture notes and
  QC output -- see <a href="./qc-report">QC Report</a> for the latest
  validation run.

callouts:
  status-done:
    color: green
  status-partial:
    color: yellow
  status-todo:
    color: red
